spring:
  application:
    name: aiops-agent-mvp

server:
  port: 8080

aiops:
  graph:
    runner: manual
  diagnosis:
    mode: mock
    llm:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model-name: ${OPENAI_MODEL:gpt-4.1-mini}
      timeout-seconds: 30
      max-retries: 2
